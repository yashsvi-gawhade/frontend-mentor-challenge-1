<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <style>
    body{
      background-color: #d5e1ef;
    }
    .container{
      width: 1000px;
      height:900px;
      border-radius: 10px;
      display:flex;
      align-items: center;
      justify-content: center;
    }

    .qr-box{
      width: 430px;
      height:650px;
      background-color: white;
      border-radius: 17px;
      box-shadow: 0px 0px 20px -10px;
    }

    img{
      width: 390px;
      object-fit: contain;
      padding: 20px;
      border-radius: 40px;
    }
    .text1{
      font-size: 27px;
      padding: 0 40px 0 40px;
      text-align: center;
      color:rgb(0, 29, 73);
      font-family: 'arial';
      font-weight: bold;
    }

    .text2{
      font-size: 18px;
      padding: 25px 50px 10px 50px;
      text-align: center;
      line-height: 27px;
      color:gray;
      font-family: 'arial';
    }
  </style>

</head>
<body>

  <div class="container">
    <div class="qr-box">

      <div class="img-container">
        <img src="images/image-qr-code.png">
      </div>

      <div class="text">

         <div class="text1">Improve your front-end skills by building projects</div>
         <div class="text2">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</div>

      </div>

    </div>
  </div>

</body>
</html>
